<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- encoding karakter -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexicLand - AI Simplifier for Dyslexic</title> <!-- judul tab -->
    <link rel="icon" sizes="16x16" href="/static/Group 1.png"> <!-- icon website -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@100..900&display=swap" rel="stylesheet"> <!-- font -->
    <link rel="stylesheet" href="/static/header.css"> <!-- CSS header -->
    <link rel="stylesheet" href="/static/content.css"> <!-- CSS content -->
</head>
<body>
    <header>
        <img src="/static/Group 1.png" alt="Logo LexicLand" width="60" height="65"> <!-- logo -->
        <div class = "menu">
            <a href="/">Home</a> <!-- menu navigasi -->
        </div>
    </header>
    <div class="content">
        <div class="content-home">
            <div class="left-home">
                <h1>LexicLand</h1> <!-- judul -->
                <p>AI Text Simplifier for Dyslexia</p>

                <div>
                    <nav>
                        <a href="#try">Try It</a> <!-- scroll ke section input -->
                    </nav>
                </div>
            </div>
            <div class="right-home">
                <img src="/static/LexicLand-Decoration.png" alt="LexicLand Decoration"> <!-- gambar -->
            </div>
        </div>
        <div class="main-content" id="try">
            <div class="input-text">
                <h3>AI Text Simplifier</h3> <!-- judul fitur -->

                <div class="input-box">
                    <textarea id="inputText" placeholder="Insert your text here..."></textarea> <!-- input user -->
                    <br><br>
                    <button onclick="simplifyText()">Simplify Text</button> <!-- tombol kirim ke backend -->
                </div>
            </div>
            <div class="output-text" id="result">
                <div class="before">
                    <div class="label">Before</div> <!-- label input -->
                    <textarea id="before-text" readonly></textarea> <!-- text asli -->
                </div>
                <div class="after">
                    <div class="label">After</div> <!-- label output -->
                    <textarea id="after-text" readonly></textarea> <!-- hasil AI -->

                    <div class="action-row">
                        <button onclick="copyText(this)">Copy</button> <!-- copy hasil -->
                        <button id="speakButton" onclick="toggleSpeech()">Speak</button> <!-- text to speech -->
                    </div>
                    <p id="tts-status" class="tts-status">Text-to-speech ready.</p> <!-- status TTS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUtterance = null; // menyimpan suara TTS
        let isSpeaking = false; // status apakah sedang berbicara

        // kata umum bahasa Inggris
        const ENGLISH_MARKERS = [ 
            "the", "and", "is", "are", "to", "of", "in", "for", "with", "on",
            "this", "that", "it", "be", "as", "by", "from", "or", "an", "at"
        ];

        // kata umum bahasa Indonesia
        const INDONESIAN_MARKERS = [
            "yang", "dan", "di", "ke", "dari", "untuk", "dengan", "ini", "itu", "adalah",
            "tidak", "pada", "karena", "atau", "juga", "dalam", "akan", "bisa", "sudah", "agar"
        ];

        // auto resize semua textarea
        document.querySelectorAll("textarea").forEach(textarea=> {
            textarea.addEventListener("input", function() {
                autoResize(this);
            });
        });

        function autoResize(textarea) {
            textarea.style.height = "auto"; // reset tinggi
            textarea.style.height = textarea.scrollHeight + "px"; // sesuaikan isi
        }

        function syncResultHeights() {
            
            const resultAreas = [
                document.getElementById("before-text"),
                document.getElementById("after-text")
            ];

            resultAreas.forEach((textarea) => {
                textarea.style.height = "auto";
            });

            const tallestHeight = Math.max(
                320,
                ...resultAreas.map((textarea) => textarea.scrollHeight)
            );

            resultAreas.forEach((textarea) => {
                textarea.style.height = `${tallestHeight}px`;
            });
        }

        // update teks status TTS
        function setTtsStatus(message) {
            document.getElementById("tts-status").innerText = message;
        }

        // ubah teks tombol speak/stop
        function updateSpeakButton() {
            document.getElementById("speakButton").innerText = isSpeaking ? "Stop" : "Speak";
        }

        // hitung kecocokan kata bahasa
        function countLanguageMatches(words, markers) {
            return words.reduce((total, word) => total + (markers.includes(word) ? 1 : 0), 0);
        }

        // deteksi bahasa sederhana
        function detectDominantLanguage(text) {
            const words = text
                .toLowerCase()
                .replace(/[^a-zA-Z\s]/g, " ")
                .split(/\s+/)
                .filter(Boolean);

            if (words.length === 0) {
                return {
                    lang: "en-US",
                    label: "English"
                };
            }

            const englishScore = countLanguageMatches(words, ENGLISH_MARKERS);
            const indonesianScore = countLanguageMatches(words, INDONESIAN_MARKERS);

            if (indonesianScore > englishScore) {
                return {
                    lang: "id-ID",
                    label: "Bahasa Indonesia"
                };
            }

            return {
                lang: "en-US",
                label: "English"
            };
        }

        // pilih voice sesuai bahasa
        function pickVoice(targetLang) {
            const voices = window.speechSynthesis.getVoices();
            return voices.find((voice) => voice.lang.toLowerCase().startsWith(targetLang.toLowerCase()));
        }

        // fungsi utama integrasi frontend dan backend
        async function simplifyText() {
            const input = document.getElementById("inputText");
            const beforeText = document.getElementById("before-text");
            const afterText = document.getElementById("after-text");
            const text = input.value.trim();

            if (!text) {
                alert("Please enter text first!");
                return;
            }

            // stop suara lama
            window.speechSynthesis.cancel();
            isSpeaking = false;
            updateSpeakButton();
            setTtsStatus("Text-to-speech ready.");

            beforeText.value = text; // tampilkan input
            afterText.value = "Processing..."; // loading
            autoResize(beforeText);
            autoResize(afterText);
            syncResultHeights();

            const outputBox = document.querySelector(".output-text");
            outputBox.classList.add("show"); // tampilkan output

            document.getElementById("result").scrollIntoView({
                behavior: "smooth" 
            });

            try {
                const response = await fetch("/simplify", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || "Failed to simplify text.");
                }

                const data = await response.json();
                afterText.value = data.simplified_text; // tampilkan hasil
                autoResize(afterText);
                syncResultHeights();
                setTtsStatus("Simplified text is ready to read aloud.");
            }
            catch (error) {
                console.error(error);
                afterText.value = error.message || "Error occurred!";
                autoResize(afterText);
                syncResultHeights();
                setTtsStatus("Text-to-speech is unavailable until simplify succeeds.");
            }
        }

        // copy hasil ke clipboard
        function copyText(btn) {
            const afterText = document.getElementById("after-text").value;

            if (!afterText || afterText === "Processing...") {
                return;
            }

            navigator.clipboard.writeText(afterText);

            btn.innerText = "Copied!";
            setTimeout(() => {
                btn.innerText = "Copy";
            }, 1500);
        }

        // text-to-speech
        function toggleSpeech() {
            const output = document.getElementById("after-text").value.trim();

            if (!("speechSynthesis" in window)) {
                setTtsStatus("Your browser does not support text-to-speech.");
                return;
            }

            if (!output || output === "Processing...") {
                setTtsStatus("Simplify text first before using text-to-speech.");
                return;
            }

            if (isSpeaking) {
                window.speechSynthesis.cancel();
                isSpeaking = false;
                currentUtterance = null;
                updateSpeakButton();
                setTtsStatus("Speech stopped.");
                return;
            }

            const detectedLanguage = detectDominantLanguage(output);
            currentUtterance = new SpeechSynthesisUtterance(output);
            currentUtterance.rate = 0.9;
            currentUtterance.pitch = 1;
            currentUtterance.lang = detectedLanguage.lang;

            const selectedVoice = pickVoice(detectedLanguage.lang);
            if (selectedVoice) {
                currentUtterance.voice = selectedVoice;
            }

            currentUtterance.onstart = () => {
                isSpeaking = true;
                updateSpeakButton();
                setTtsStatus(`Reading in ${detectedLanguage.label}...`);
            };

            currentUtterance.onend = () => {
                isSpeaking = false;
                currentUtterance = null;
                updateSpeakButton();
                setTtsStatus("Finished reading.");
            };

            currentUtterance.onerror = () => {
                isSpeaking = false;
                currentUtterance = null;
                updateSpeakButton();
                setTtsStatus("Text-to-speech failed. Try again.");
            };

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(currentUtterance);
        }

        if ("speechSynthesis" in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
        
        window.addEventListener("resize", syncResultHeights); // responsive height
    </script>
</body>
</html>
